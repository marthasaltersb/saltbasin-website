name: Keepalive

# Pings the Render backend every 13 minutes so the free-tier service never
# spins down (Render free spins down after 15 min idle). After migration the
# health check also touches Supabase Postgres, so this transitively keeps the
# database active too (Supabase auto-pauses after 7 days of inactivity).
#
# Costs: zero. GitHub Actions free tier is 2,000 minutes/month for private
# repos and unlimited for public — each run takes ~5 seconds.

on:
  schedule:
    # Every 10 minutes — leaves a 5-minute safety buffer against Render's
    # 15-minute spin-down. GitHub Actions cron can be delayed during peak
    # load, so we err on the side of more frequent pings. For redundancy
    # against GH Actions outages, also configure UptimeRobot (free) to ping
    # /api/health every 5 minutes.
    - cron: '*/10 * * * *'
  workflow_dispatch:        # also runs on demand via the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping health endpoint
        run: |
          # -fSL: fail on HTTP errors, silent except errors, follow redirects.
          # --max-time 60: give Render up to a minute to cold-start if needed.
          # The status code is logged for visibility in the Actions UI.
          curl -fSL --max-time 60 -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
            https://saltbasin-website.onrender.com/api/health
